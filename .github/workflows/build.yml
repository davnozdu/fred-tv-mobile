name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Builds one APK per ABI: armeabi-v7a (32-bit) and arm64-v8a (64-bit)
      - name: Build APKs (32-bit + 64-bit)
        run: flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fred-tv-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
